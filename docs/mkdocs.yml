site_name: QR Code 文件传输工具 - 文档
site_description: 二维码文件传输程序完整使用文档
site_author: QR Code Transfer Team
repo_url: https://github.com/your-repo/qrcode_transfer
edit_uri: ""
docs_dir: C:\Users\pengfei.ma\Desktop\CODE\Python\qrcode_transfer\docs
site_dir: C:\Users\pengfei.ma\Desktop\CODE\Python\qrcode_transfer\docs-site

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.indexes
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true

